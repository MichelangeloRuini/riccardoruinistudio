<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Riccardo Ruini Studio</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="landing-active">

  <div class="custom-cursor">ENTER</div>

  <section class="landing" id="landing">
    <video autoplay muted loop playsinline class="landing-video">
      <source src="assets/hero.mp4" type="video/mp4" />
    </video>

    <div class="landing-logo">
      <img src="assets/logo-main.svg" alt="Riccardo Ruini Studio" />
    </div>
  </section>

  <main class="site" id="site">

    <header class="site-header">
      <div class="site-header-left">
        <img src="assets/logo-main.svg" alt="Riccardo Ruini Studio" class="site-logo" />
        <input class="search" id="searchInput" type="text" placeholder="SEARCH" />
      </div>

      <nav class="site-nav">
        <a href="#" class="active">Clients</a>
        <a href="campaigns.html">Campaigns</a>
        <a href="#">Films</a>
        <a href="#">Magazine and Books</a>
        <a href="#">Brand Identity</a>
        <a href="#">Branding</a>
        <a href="#">About</a>
      </nav>
    </header>

    <section class="clients-section">
      <div class="clients-wall-wrapper">
        <div class="clients-wall" id="clientsWall"></div>
      </div>
    </section>

    <footer class="footer">
      <div class="footer-address">
        VIA DI MONSERRATO 34<br>
        00186 ROMA<br>
        ITALIA
      </div>

      <div class="footer-social">
        INSTAGRAM<br>
        LINKEDIN<br>
        INFO@RICCARDORUINISTUDIO.COM
      </div>

      <div class="footer-legal">
        PRIVACY POLICY<br>
        TERMS AND CONDITIONS<br>
        CAREERS
      </div>

      <div class="footer-newsletter">
        <input type="email" placeholder="JOIN OUR NEWSLETTER" />
      </div>

      <div class="footer-logo">
    <img src="assets/ui/logo-footer-01.png" class="footer-logo-frame frame-1">
    <img src="assets/ui/logo-footer-02.png" class="footer-logo-frame frame-2">
</div>
    </footer>

  </main>

  <script src="script.js"></script>
</body>
</html>
