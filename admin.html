<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>RRS Admin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="cms-dashboard">
  <div class="cms-dashboard-header">
    <h2>Campaigns Dashboard</h2>
<div class="dashboard-buttons">
  <span id="gitStatus" class="git-status git-status--loading" role="status" aria-live="polite">Checking Git...</span>
  <button id="saveCampaignOrder" type="button">Save Order</button>
  <button id="publishSite" type="button">Publish</button>
  <button id="refreshCampaigns" type="button">Refresh</button>
</div>
  </div>

  <div id="campaignsList" class="campaigns-list">
    Loading campaigns...
  </div>
</section>

  <main class="admin-page">
    <h1>RRS CAMPAIGN ADMIN</h1>

    <label>CLIENTE</label>
    <input id="client" type="text">

    <label>STAGIONE / TITOLO</label>
    <input id="title" type="text">

    <label>NOME CARTELLA</label>
    <input id="folder" type="text" placeholder="es. pinko-fw21">

    <label>FRAME NERO</label>
    <select id="border">
      <option value="false">No</option>
      <option value="true">Sì</option>
    </select>

    <label>CREDITS</label>
    <textarea id="credits" placeholder="Photographer: Julia Noni&#10;Models: Sofia Klimkowski, Molly Boundary&#10;Director: Gia Coppola"></textarea>

    <section id="existingMediaSection" class="existing-media-section" hidden>
      <h2>MEDIA ESISTENTI</h2>
      <p class="existing-media-note">Trascina le anteprime per cambiare solo l'ordine dei media.</p>
      <div id="existingMediaGallery" class="existing-media-gallery"></div>
      <button id="saveMediaOrder" type="button" hidden disabled>Save Media Order</button>
    </section>

    <section id="newCampaignMediaSection">
      <label>IMMAGINI / VIDEO</label>

      <div id="dropzone" class="admin-dropzone">
        Trascina qui immagini e video<br>
        <span>oppure clicca per selezionarli</span>
      </div>

      <input id="files" type="file" multiple accept=".jpg,.jpeg,.png,.mp4" hidden>

      <div id="preview" class="admin-preview"></div>
    </section>

    <button id="generate">CREATE CAMPAIGN</button>
    <button id="saveEdit" type="button" hidden>Save Edit</button>
    <button id="cancelEdit" type="button" hidden>Cancel Edit</button>

    <label>RISULTATO</label>
    <textarea id="output" readonly></textarea>

    <button id="copy">COPY CODE</button>
  </main>

  <script src="admin.js?v=2"></script>
</body>
</html>
